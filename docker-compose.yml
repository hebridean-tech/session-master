version: '3.8'
services:
  session-master:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://postgres:session_master_pw@db:5432/session_master
      - BETTER_AUTH_URL=https://session.projectveritos.com
      - BETTER_AUTH_SECRET=${AUTH_SECRET}
      - ORIGIN=https://session.projectveritos.com
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=session_master
      - POSTGRES_PASSWORD=session_master_pw
    volumes:
      - session_master_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  session_master_data:
